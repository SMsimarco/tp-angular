<table class="table text-center">
    <thead>
        <tr>
            <th>Disco</th>
            <th>Banda</th>
            <th>Año</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Portada</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let disc of discos" [ngClass]="{'clearance': disc.clearance}">
            <td>{{disc.name}}</td>
            <td>{{disc.band}}</td>
            <td>{{disc.year}}</td>
            <td>{{disc.price | currency}}</td>
            <td>
                <span class="badge bg-warning text-dark" *ngIf="disc.stock == 0">SIN STOCK</span>
                <span *ngIf="disc.stock > 0">{{disc.stock}}</span>
            </td>
            <td>
                <img width="90px" class="img-thumbnail" [src]="disc.img" [alt]="disc.name">
            </td>
            <td>
                <app-input-number [quantity]="disc.quantity" [max]="disc.stock" *ngIf="disc.stock"></app-input-number>
            </td>
        </tr>
    </tbody>
</table>
