<table class="table text-center">
    <thead>
        <tr>
            <th>Disco</th>
            <th>Banda</th>
            <th>Año</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Portada</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let disc of discos" [ngClass]="{'clearance': disc.clearance}">
            <td>{{disc.name}}</td>
            <td>{{disc.band}}</td>
            <td>{{disc.year}}</td>
            <td>{{disc.price | currency}}</td>
            <td>
                <span class="badge bg-warning text-dark" *ngIf="disc.stock == 0">SIN STOCK</span>
                <span *ngIf="disc.stock > 0">{{disc.stock}}</span>
            </td>
            <td>
                <img width="90px" class="img-thumbnail" [src]="disc.img" [alt]="disc.name">
            </td>
            <td>
                <div class="input-group input-group-sm justify-content-center">
                    <button class="btn btn-sm" (click)="downQuantity(disc)">-</button>
                    <input type="text" class="form-control text-center" [(ngModel)]="disc.quantity"
                        (keyup)="ChangeQuantity($event, disc)">
                    <button class="btn btn-sm" (click)="upQuantity(disc)">+</button>
                </div>
            </td>
        </tr>
    </tbody>
</table>
