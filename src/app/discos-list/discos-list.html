<table class="table text-center">
    <thead>
        <tr>
            <th>Disco</th>
            <th>Banda</th>
            <th>Año</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Portada</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let disc of discos" [ngClass]="{'clearance': disc.clearance}">
            <td>{{disc.name}}</td>
            <td>{{disc.band}}</td>
            <td>{{disc.year}}</td>
            <td>{{disc.price | currency}}</td>
            <td>
                <span class="badge bg-warning text-dark" *ngIf="disc.stock == 0">SIN STOCK</span>
                <span *ngIf="disc.stock > 0">{{disc.stock}}</span>
            </td>
            <td>
                <img width="90px" class="img-thumbnail" [src]="disc.img" [alt]="disc.name">
            </td>
            <td>
                <div class="d-flex flex-column align-items-center gap-2">
                    <app-input-number [quantity]="disc.quantity" [max]="disc.stock" (quantityChange)="disc.quantity = $event" *ngIf="disc.stock"></app-input-number>
                    <button class="btn btn-primary btn-sm rounded-pill px-3 buy-btn" (click)="addToCart(disc)" *ngIf="disc.stock">Comprar</button>
                </div>
            </td>
        </tr>
    </tbody>
</table>
